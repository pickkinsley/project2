<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PackSmart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6b21a8, #7c3aed, #4f46e5);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 2rem;
      color: #1e1b4b;
      margin-bottom: 16px;
    }

    p {
      font-size: 1.1rem;
      color: #6b7280;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 6px 16px;
      background: #f3e8ff;
      color: #7c3aed;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎒 PackSmart - Smart Packing List Generator</h1>
    <p>Module 4 Planning Complete — Implementation begins in Module 5!</p>
    <span class="badge">Infrastructure Test</span>
  </div>
</body>
</html>
